<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Inscripción</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Sistema de Inscripción</h1>
                <p>Gestiona tus cursos fácilmente</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input
                        type="email"
                        id="correo"
                        placeholder="tu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Ingresa tu contraseña"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Ingresar
                </button>
            </form>

            <div id="mensaje" class="message-box"></div>

            <div class="auth-footer">
                <p>¿No tienes cuenta? <a href="register.html" class="auth-link">Registrarse aquí</a></p>
                <p style="margin-top: 10px;">
                    <a href="recuperar.html" class="auth-link" style="font-size: 0.9em; opacity: 0.85;">¿Olvidaste tu contraseña?</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
