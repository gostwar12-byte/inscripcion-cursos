<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <h1>Listado de Cursos</h1>

    <button id="logoutBtn">
        Cerrar Sesión
    </button>

    <hr>

    <h2>Crear Curso</h2>

    <form id="cursoForm">

        <input
            type="text"
            id="nombre"
            placeholder="Nombre del curso"
            required
        >

        <input
            type="text"
            id="descripcion"
            placeholder="Descripción"
            required
        >

        <input
            type="number"
            id="cupos"
            placeholder="Cantidad de cupos"
            required
        >

        <input
            type="date"
            id="fechaInicio"
            required
        >

        <button type="submit" id="crearCurso">
            Crear Curso
        </button>

    </form>

    <hr>

    <h2>Cursos Registrados</h2>

    <div id="cursosContainer">
        <!-- Aquí se mostrarán los cursos -->
    </div>

    <script src="js/cursos.js"></script>

</body>
</html>
